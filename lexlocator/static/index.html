<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LegitLex — hyper-local legal compliance</title>
<!-- PWA: installable to home screen -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#3F38C9">
<meta name="description" content="Know what's legal — right where you stand. GPS-aware, citation-backed legal compliance answers.">
<link rel="icon" type="image/png" href="/static/icons/favicon.png">
<link rel="apple-touch-icon" href="/static/icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LegitLex">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────  base  ───────────────────────── */
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow:hidden}
body{
  background:
    radial-gradient(1200px 700px at 50% -10%, #2c2f49 0%, transparent 60%),
    linear-gradient(180deg, #14161f 0%, #0e0f16 100%);
  min-height:100vh;
  font-family:'Public Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
a{color:var(--primary);text-decoration:none}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}

.ll-stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14px;overflow:hidden}
.ll-fit{transform-origin:center center;flex:0 0 auto}
.ll-root{font-family:var(--font-ui);color:var(--ink)}

.ll-device-inner{position:relative;height:100%;overflow:hidden}

/* Real phones: no simulated device frame / letterbox — fill the viewport. */
.ll-stage-mobile{min-height:100vh;min-height:100dvh;padding:0;display:block;overflow:visible}
.ll-fit-mobile{width:100%;transform:none}
.ll-mobile{width:100vw;height:100vh;height:100dvh;overflow:hidden;background:var(--paper)}
.ll-mobile .ll-device-inner{width:100%;height:100%}

/* ───────────────────────────────────────  scaffold  ─────────────────────── */
.ll-screen{height:100%;display:flex;flex-direction:column;overflow:hidden;font-family:var(--font-ui)}
.ll-screen-body{flex:1;display:flex;flex-direction:column;min-height:0}
.ll-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px;-webkit-overflow-scrolling:touch}
.ll-scroll::-webkit-scrollbar{width:0}

/* appbar */
.ll-appbar{display:flex;align-items:center;gap:6px;padding:58px 10px 9px;position:relative;z-index:6}
.ll-appbar-side{flex:1;display:flex;align-items:center;gap:2px;min-width:44px}
.ll-appbar-title{flex:0 1 auto;text-align:center;font-weight:700;font-size:16px;letter-spacing:-.2px}
.ll-appbar-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3);font-weight:700}
.ll-appbar-h1{font-family:var(--font-legal);font-weight:800;font-size:27px;letter-spacing:-.5px;color:var(--ink);padding-left:6px}

.ll-iconbtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);transition:background .15s}
.ll-iconbtn:hover{background:var(--surface-3)}
.ll-iconbtn.is-active{color:var(--primary);background:var(--primary-soft)}
.ll-back{display:flex;align-items:center;gap:2px;color:var(--primary);font-size:16px;font-weight:600;padding:6px 8px 6px 2px}

/* tabbar */
.ll-tabbar{display:flex;align-items:flex-start;justify-content:space-around;padding:9px 6px 24px;
  background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);border-top:1px solid var(--line);position:relative;z-index:7}
.ll-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-3);font-size:10.5px;font-weight:600;letter-spacing:.1px;padding:2px 0}
.ll-tab.is-on{color:var(--primary)}

/* buttons / chips */
.ll-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;font-weight:650;
  font-size:15px;transition:transform .08s,background .15s,box-shadow .15s;line-height:1}
.ll-btn:active{transform:scale(.98)}
.ll-btn-md{padding:12px 16px}
.ll-btn-lg{padding:15px 18px;font-size:16px;border-radius:15px}
.ll-btn-primary{background:var(--primary);color:var(--primary-ink);box-shadow:0 1px 2px rgba(20,20,40,.12),0 8px 20px -8px color-mix(in srgb,var(--primary) 60%,transparent)}
.ll-btn-primary:active{background:var(--primary-press)}
.ll-btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line-2)}
.ll-btn-soft{background:var(--primary-soft);color:var(--primary-soft-ink)}
.ll-btn.is-full{display:flex;width:100%}

.ll-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;background:var(--surface);
  border:1px solid var(--line);font-size:13.5px;font-weight:600;color:var(--ink-2)}
.ll-chip.is-active{background:var(--primary-soft);color:var(--primary-soft-ink);border-color:transparent}

.ll-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 1px 2px rgba(20,22,40,.04)}

.ll-seclabel{display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;font-size:11.5px;
  letter-spacing:.9px;color:var(--ink-3);font-weight:700;margin:22px 2px 10px}
.ll-seclabel-n{font-family:var(--font-mono);font-weight:600;color:var(--ink-3)}

/* level badge */
.ll-level{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.6px;
  padding:3px 7px;border-radius:6px;text-transform:uppercase;line-height:1}
.ll-level-city{color:var(--primary-soft-ink);background:var(--primary-soft)}
.ll-level-county{color:var(--unknown-ink);background:var(--unknown-soft)}
.ll-level-state{color:var(--warn-ink);background:var(--warn-soft)}
.ll-level-federal{color:var(--yes-ink);background:var(--yes-soft)}
.ll-level-unknown{color:var(--ink-3);background:var(--surface-3)}

/* verdict tag */
.ll-vtag{display:inline-flex;align-items:center;gap:6px;padding:4px 9px 4px 8px;border-radius:999px;font-size:12px;font-weight:700;line-height:1}
.ll-vtag-sm{font-size:11px;padding:3px 8px 3px 7px}
.ll-vtag-dot{width:6px;height:6px;border-radius:999px}

/* confidence */
.ll-conf-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ll-conf-label{text-transform:uppercase;font-size:11px;letter-spacing:.8px;color:var(--ink-3);font-weight:700}
.ll-conf-val{font-size:13px;font-weight:700}
.ll-conf-track{position:relative;height:7px;border-radius:999px;background:var(--surface-3);overflow:hidden}
.ll-conf-fill{position:absolute;left:0;top:0;height:100%;border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.ll-conf-tick{position:absolute;top:0;width:1.5px;height:100%;background:var(--surface);opacity:.7}

/* citation */
.ll-cites{display:flex;flex-direction:column;gap:10px}
.ll-cite{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px}
.ll-cite-top{display:flex;align-items:center;justify-content:space-between}
.ll-cite-sid{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink-2)}
.ll-cite-name{font-family:var(--font-legal);font-weight:700;font-size:15px;color:var(--ink);margin:9px 0 7px;line-height:1.3}
.ll-cite-para{margin:0;font-size:13.5px;color:var(--ink-2);line-height:1.5}
.ll-cite-source{margin-top:11px;background:var(--surface-2);border-radius:10px;padding:12px;border-left:3px solid var(--primary)}
.ll-cite-quote{font-family:var(--font-legal);font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.55}
.ll-cite-meta{display:flex;align-items:center;gap:6px;margin-top:9px;font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
.ll-cite-toggle{display:flex;align-items:center;gap:6px;color:var(--primary);font-size:13px;font-weight:600;margin-top:11px}

/* loc chip */
.ll-locchip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px 6px 9px;border-radius:999px;background:var(--surface);
  border:1px solid var(--line);font-size:13.5px;font-weight:600;color:var(--ink)}
.ll-locchip-dot{width:7px;height:7px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 60%,transparent);animation:pulse 2.2s infinite}
.ll-locchip-text{white-space:nowrap}

/* disclaimer */
.ll-disclaimer{display:flex;gap:8px;align-items:flex-start;font-size:11.5px;color:var(--ink-3);line-height:1.5;
  padding:16px 2px 6px;border-top:1px solid var(--line);margin-top:20px}
.ll-disclaimer.is-compact{border-top:none;padding:14px 2px 2px}
.ll-disclaimer svg{flex-shrink:0;margin-top:1px}

.ll-spinner{display:inline-block;border:2px solid;border-radius:999px;animation:spin .7s linear infinite}

/* ─────────────────────────────────────  onboarding  ─────────────────────── */
.ll-onb{height:100%;display:flex;flex-direction:column;justify-content:space-between;
  padding:0 26px 38px;color:var(--primary-ink);position:relative;overflow:hidden}
.ll-onb-grain{position:absolute;inset:0;opacity:.5;pointer-events:none;
  background:radial-gradient(circle at 18% 12%, rgba(255,255,255,.10) 0 1px, transparent 1.5px) 0 0/22px 22px,
            radial-gradient(120% 80% at 50% 120%, color-mix(in srgb,#000 26%,transparent), transparent 60%)}
.ll-onb-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;position:relative}
.ll-onb-emblem{filter:drop-shadow(0 8px 22px rgba(0,0,0,.28));animation:rise .7s ease}
.ll-onb-word{font-family:var(--font-legal);font-weight:800;font-size:46px;letter-spacing:-1px;margin:0;line-height:1}
.ll-onb-tag{font-size:15.5px;opacity:.82;margin:-6px 0 0;max-width:260px;line-height:1.45}
.ll-onb-bottom{display:flex;flex-direction:column;gap:13px;position:relative}
.ll-locate{display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:16px;padding:13px 15px;transition:background .3s}
.ll-locate.is-done{background:rgba(255,255,255,.16)}
.ll-locate-radar{width:38px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.14);position:relative}
.ll-locate-radar::after{content:"";position:absolute;inset:0;border-radius:999px;border:2px solid rgba(255,255,255,.5);animation:radar 1.6s ease-out infinite}
.ll-locate-check{width:38px;height:38px;border-radius:999px;background:var(--primary-ink);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-locate-text{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.ll-locate-text strong{font-size:15px;font-weight:700}
.ll-locate-text span{font-size:12px;opacity:.78}
.ll-locate-cov{font-size:11px;font-weight:700;background:rgba(255,255,255,.16);padding:5px 9px;border-radius:999px;white-space:nowrap}
.ll-onb-enter{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--primary-ink);
  color:var(--primary);border-radius:16px;padding:16px;font-size:16.5px;font-weight:750;transition:opacity .2s,transform .08s}
.ll-onb-enter:disabled{opacity:.45}
.ll-onb-enter:active:not(:disabled){transform:scale(.98)}
.ll-onb-fine{font-size:11px;opacity:.62;text-align:center;margin:2px 0 0;line-height:1.5}

/* ────────────────────────────────────────  ask  ─────────────────────────── */
.ll-ask-hero{padding:6px 2px 0}
.ll-ask-kicker{display:flex;align-items:center;gap:6px;color:var(--primary);font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px}
.ll-ask-h1{font-family:var(--font-legal);font-weight:800;font-size:35px;line-height:1.04;color:var(--ink);margin:12px 0 0;letter-spacing:-.6px}
.ll-ask-h1 em{color:var(--primary);font-style:normal}
.ll-ask-sub{font-size:15px;color:var(--ink-2);line-height:1.5;margin:11px 0 0}
.ll-askbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-top:18px;
  box-shadow:0 2px 6px rgba(20,22,40,.05),0 14px 34px -22px rgba(20,22,40,.3)}
.ll-askinput{width:100%;border:none;outline:none;resize:none;background:transparent;font-family:var(--font-ui);
  font-size:16px;color:var(--ink);line-height:1.45}
.ll-askinput::placeholder{color:var(--ink-3)}
.ll-askbox-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
.ll-ctxbtn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:8px 12px}
.ll-ctxbtn.is-on{color:var(--primary-soft-ink);background:var(--primary-soft);border-color:transparent}
.ll-ctxbtn-badge{font-size:9.5px;font-weight:700;background:var(--primary);color:var(--primary-ink);padding:1px 5px;border-radius:999px;text-transform:uppercase}
.ll-asksubmit{display:flex;align-items:center;gap:6px;background:var(--primary);color:var(--primary-ink);
  border-radius:999px;padding:10px 16px;font-weight:700;font-size:14.5px;box-shadow:0 6px 16px -8px color-mix(in srgb,var(--primary) 70%,transparent)}
.ll-asksubmit:active{transform:scale(.97)}
.ll-ctx{margin-top:13px;border-top:1px solid var(--line);padding-top:13px}
.ll-ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ll-field{display:flex;flex-direction:column;gap:6px}
.ll-field span{text-transform:uppercase;font-size:10.5px;letter-spacing:.5px;color:var(--ink-3);font-weight:700}
.ll-field input{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:14px;color:var(--ink);outline:none;font-family:var(--font-ui)}
.ll-field input:focus{border-color:var(--primary)}
.ll-ctx-note{font-size:12px;color:var(--ink-3);margin:9px 0 0;line-height:1.45}

.ll-sugg{display:flex;flex-direction:column;gap:8px}
.ll-sugg-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:12px 13px;width:100%;text-align:left;transition:transform .08s,border-color .15s}
.ll-sugg-row:active{transform:scale(.99)}
.ll-sugg-row:hover{border-color:var(--line-2)}
.ll-sugg-ic{width:38px;height:38px;border-radius:11px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-sugg-text{flex:1;font-size:14.5px;color:var(--ink);font-weight:500;line-height:1.3}

.ll-scanbanner{display:flex;align-items:center;gap:13px;width:100%;background:var(--primary-soft);border-radius:var(--radius);
  padding:14px;margin-top:16px;text-align:left;transition:transform .08s}
.ll-scanbanner:active{transform:scale(.99)}
.ll-scanbanner-ic{width:42px;height:42px;border-radius:12px;background:var(--primary);color:var(--primary-ink);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-scanbanner-txt{flex:1;display:flex;flex-direction:column;gap:2px}
.ll-scanbanner-txt strong{font-size:14.5px;color:var(--primary-soft-ink)}
.ll-scanbanner-txt span{font-size:12.5px;color:var(--ink-2);line-height:1.35}

/* ──────────────────────────────────────  thinking  ──────────────────────── */
.ll-think{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;text-align:center}
.ll-think-q{font-family:var(--font-legal);font-style:italic;font-size:18px;color:var(--ink);margin-top:24px;line-height:1.4}
.ll-think-count{color:var(--ink-2);font-size:13px;margin-top:8px}
.ll-think-num{font-family:var(--font-mono);font-weight:700;color:var(--primary);font-size:15px}
.ll-think-steps{margin-top:28px;display:flex;flex-direction:column;gap:14px;align-items:flex-start}
.ll-think-step{display:flex;align-items:center;gap:10px;color:var(--ink-3);font-size:13.5px;transition:color .3s}
.ll-think-step.is-active{color:var(--ink);font-weight:600}
.ll-think-step.is-done{color:var(--ink-2)}
.ll-think-dot{width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ──────────────────────────────────────  verdict  ───────────────────────── */
.ll-cert{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 16px 18px;margin-top:8px;text-align:center;box-shadow:0 2px 8px rgba(20,22,40,.06),0 24px 50px -34px rgba(20,22,40,.4)}
.ll-cert-yes{--vc:var(--yes)} .ll-cert-no{--vc:var(--no)} .ll-cert-warning{--vc:var(--warn)} .ll-cert-unknown{--vc:var(--unknown)}
.ll-cert-bar{position:absolute;top:0;left:0;right:0;height:5px;background:var(--vc)}
.ll-cert-guilloche{position:absolute;inset:0;pointer-events:none;opacity:.5;
  background:radial-gradient(circle at 50% 42%, color-mix(in srgb,var(--vc) 8%,transparent) 0, transparent 58%),
            repeating-radial-gradient(circle at 50% 42%, transparent 0 13px, color-mix(in srgb,var(--vc) 5%,transparent) 13px 14px)}
.ll-cert-q{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--ink-2);font-family:var(--font-legal);
  font-style:italic;font-size:14.5px;position:relative;line-height:1.3;padding:0 6px;margin-bottom:10px;text-align:center}
/* design re-skin: certificate frame, eyebrow, layers stack */
.ll-cert-frame{position:absolute;inset:9px;border:1px solid color-mix(in srgb,var(--vc) 28%,transparent);border-radius:calc(var(--radius) - 7px);pointer-events:none}
.ll-cert-frame::after{content:"";position:absolute;inset:3px;border:1px solid color-mix(in srgb,var(--vc) 14%,transparent);border-radius:inherit}
.ll-cert-corner{position:absolute;width:7px;height:7px;background:var(--vc);transform:rotate(45deg);opacity:.9}
.ll-cert-corner.tl{top:-4px;left:-4px} .ll-cert-corner.tr{top:-4px;right:-4px}
.ll-cert-corner.bl{bottom:-4px;left:-4px} .ll-cert-corner.br{bottom:-4px;right:-4px}
.ll-cert-eyebrow{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:7px}
.ll-cert-eyebrow span{font-family:var(--font-legal);font-style:italic;font-size:12px;color:var(--ink-3);letter-spacing:.3px}
.ll-cert-eyebrow::before,.ll-cert-eyebrow::after{content:"";width:24px;height:1px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--vc) 45%,transparent))}
.ll-cert-eyebrow::after{transform:scaleX(-1)}
.ll-jstack{display:flex;flex-direction:column;gap:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden}
.ll-jstack-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line);opacity:.5}
.ll-jstack-row:last-child{border-bottom:none}
.ll-jstack-row.is-on{opacity:1}
.ll-jstack-ic{width:26px;height:26px;border-radius:7px;background:var(--surface-2);color:var(--ink-2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-jstack-row.is-on .ll-jstack-ic{background:var(--primary-soft);color:var(--primary)}
.ll-jstack-lbl{flex:1;font-size:13px;font-weight:600;color:var(--ink);letter-spacing:.3px}
.ll-jstack-state{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.4px}
.ll-jstack-row.is-on .ll-jstack-state{color:var(--yes-ink)}
.ll-cert-seal{display:flex;justify-content:center;margin:4px 0 6px;position:relative;opacity:1;animation:stampIn .55s cubic-bezier(.2,.9,.3,1.1)}
.ll-cert-label{font-weight:800;letter-spacing:2px;font-size:12.5px;margin-top:6px;position:relative}
.ll-cert-conf{margin-top:14px;text-align:left;padding:0 4px;position:relative}

.ll-answer{margin-top:18px}
.ll-answer p{font-family:var(--font-legal);font-size:18px;line-height:1.55;color:var(--ink);margin:0}
.ll-ctxnote{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:12px 14px;margin-top:14px;font-size:13.5px;color:var(--ink-2)}
.ll-nocite{display:flex;gap:10px;align-items:flex-start;color:var(--ink-2);font-size:13.5px;line-height:1.5}
.ll-caveat{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-top:12px}
.ll-caveat-head{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;text-transform:uppercase;color:var(--ink-3);letter-spacing:.4px;margin-bottom:7px}
.ll-caveat p{margin:0;font-size:13.5px;color:var(--ink-2);line-height:1.5}
.ll-penalty{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--warn);
  border-radius:var(--radius-sm);padding:13px 14px;margin-top:14px}
.ll-penalty-head{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;color:var(--ink-3)}
.ll-penalty-chip{margin-left:auto;font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.3px;padding:3px 8px;border-radius:6px}
.ll-penalty-text{margin:8px 0 0;font-size:14px;color:var(--ink);line-height:1.5}
.ll-conflict{background:color-mix(in srgb,var(--accent) 10%,var(--surface));border:1px solid color-mix(in srgb,var(--accent) 35%,var(--line));
  border-radius:var(--radius-sm);padding:13px 14px;margin-top:14px}
.ll-conflict-head{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);margin-bottom:8px}
.ll-conflict-row{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;color:var(--ink);line-height:1.45;margin-top:6px}
.ll-recency{font-size:10px;font-weight:700;letter-spacing:.2px;padding:2px 7px;border-radius:999px;white-space:nowrap}
.ll-risk{display:flex;align-items:center;gap:8px;margin-top:11px}
.ll-risk-label{text-transform:uppercase;font-size:11px;letter-spacing:.8px;color:var(--ink-3);font-weight:700}
.ll-risk-dots{display:flex;gap:3px;flex:1}
.ll-risk-dot{width:100%;height:6px;border-radius:3px;transition:background .4s}
.ll-risk-val{font-size:12px;font-weight:700}
.ll-juralert{background:var(--primary-soft);border:1px solid color-mix(in srgb,var(--primary) 30%,transparent);border-radius:var(--radius);padding:13px 14px;margin:10px 0 4px;animation:rise .4s ease}
.ll-juralert-top{display:flex;align-items:center;gap:8px}
.ll-juralert-top strong{flex:1;font-size:14.5px;color:var(--primary-soft-ink)}
.ll-juralert-dot{width:8px;height:8px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 60%,transparent);animation:pulse 2s infinite}
.ll-juralert-x{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);border-radius:6px}
.ll-juralert-body{font-size:12.5px;color:var(--ink-2);line-height:1.45;margin:6px 0 9px}
.ll-juralert-btn{font-size:13px;font-weight:700;color:var(--primary)}
/* compare */
.ll-cmp-places{display:flex;align-items:flex-end;gap:10px;margin-top:12px}
.ll-cmp-vs{font-size:12px;font-weight:700;color:var(--ink-3);padding-bottom:10px}
.ll-cmp-select{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:14px;color:var(--ink);font-family:var(--font-ui);width:100%}
.ll-cmp-differ{display:flex;align-items:center;gap:8px;background:var(--warn-soft);color:var(--warn-ink);border-radius:var(--radius-sm);padding:11px 13px;margin-top:16px;font-size:13.5px;font-weight:600}
.ll-cmp-same{display:flex;align-items:center;gap:8px;background:var(--yes-soft);color:var(--yes-ink);border-radius:var(--radius-sm);padding:11px 13px;margin-top:16px;font-size:13.5px;font-weight:600}
.ll-cmp-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.ll-cmp-card{background:var(--surface);border:1px solid var(--line);border-top:3px solid var(--unknown);border-radius:var(--radius-sm);padding:13px}
.ll-cmp-card-loc{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink-2)}
.ll-cmp-card-verdict{display:flex;align-items:center;gap:6px;font-weight:800;font-size:15px;margin:9px 0}
.ll-cmp-card-answer{font-size:12.5px;color:var(--ink-2);line-height:1.45;margin:0}
.ll-cmp-card-foot{font-size:11px;color:var(--ink-3);margin-top:10px}
.ll-verdict-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px}
/* complaint analyzer */
.ll-cmp-drop{display:flex;align-items:center;gap:10px;justify-content:flex-start;margin-top:14px}
.ll-cmp-or{text-align:center;color:var(--ink-3);font-size:12px;margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.ll-cmp-err{display:flex;align-items:center;gap:6px;color:var(--no);font-size:13px;margin-top:10px}
.ll-cmp-risk{display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;font-size:15px;padding:14px 16px;border-radius:var(--radius);margin-top:8px}
.ll-cmp-risk-type{font-size:11px;font-weight:700;letter-spacing:.4px;background:rgba(255,255,255,.22);padding:4px 9px;border-radius:999px}
.ll-cmp-deadline{display:flex;align-items:center;gap:7px;background:var(--warn-soft);color:var(--warn-ink);
  border-radius:var(--radius-sm);padding:11px 13px;margin-top:12px;font-size:13.5px}
.ll-cmp-alleg{display:flex;flex-direction:column;gap:8px}
.ll-cmp-alleg-row{display:flex;align-items:flex-start;gap:8px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:11px 13px;font-size:13.5px;color:var(--ink);line-height:1.45}
.ll-cmp-actions{display:flex;flex-direction:column;gap:8px}
.ll-cmp-action{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;color:var(--ink-2);line-height:1.45}

/* ────────────────────────────────────────  scan  ────────────────────────── */
.ll-sign{display:flex;flex-direction:column;align-items:center}
.ll-sign-board{background:#fff;border:4px solid #b4302b;border-radius:7px;padding:12px 22px;text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.5);min-width:160px;white-space:nowrap}
.ll-sign-top{color:#b4302b;font-weight:800;font-size:18px;letter-spacing:.5px}
.ll-sign-mid{color:#15171c;font-weight:800;font-size:20px;margin-top:4px}
.ll-sign-sub{color:#15171c;font-weight:600;font-size:11px;letter-spacing:.5px;margin-top:3px}
.ll-sign-pole{width:8px;height:42px;background:linear-gradient(90deg,#6b7079,#aeb4bd 50%,#6b7079);border-radius:0 0 2px 2px}

.ll-cam{height:100%;position:relative;background:#0b0d10;overflow:hidden}
.ll-cam-scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 38%, #2a2f37 0%, #14171c 55%, #0a0c0f 100%)}
.ll-cam-vignette{position:absolute;inset:0;background:radial-gradient(75% 60% at 50% 42%, transparent 40%, rgba(0,0,0,.55) 100%)}
.ll-cam-scanline{position:absolute;left:8%;right:8%;height:2px;top:30%;
  background:linear-gradient(90deg,transparent,#43e0b0,transparent);box-shadow:0 0 14px 2px rgba(67,224,176,.5);animation:scan 2.6s ease-in-out infinite}
.ll-cam-top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:56px 16px 0;z-index:3}
.ll-cam-x{width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.ll-cam-mode{color:#fff;font-size:12px;font-weight:700;letter-spacing:2px;background:rgba(0,0,0,.35);padding:7px 13px;border-radius:999px;backdrop-filter:blur(8px)}
.ll-cam-frame{position:absolute;top:24%;left:11%;right:11%;height:42%;z-index:2}
.ll-cam-frame .c{position:absolute;width:26px;height:26px;border:3px solid rgba(255,255,255,.92)}
.ll-cam-frame .tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:6px 0 0 0}
.ll-cam-frame .tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 6px 0 0}
.ll-cam-frame .bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 6px}
.ll-cam-frame .br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 6px 0}
.ll-cam-hint{position:absolute;bottom:-34px;left:0;right:0;text-align:center;color:rgba(255,255,255,.85);font-size:13px}
.ll-cam-bottom{position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;padding:0 16px 38px;z-index:3}
.ll-cam-loc{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.75);font-size:12.5px}
.ll-cam-controls{display:flex;align-items:center;justify-content:center;gap:40px}
.ll-cam-gallery{width:46px;height:46px;border-radius:999px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.ll-cam-shutter{width:72px;height:72px;border-radius:999px;background:transparent;border:4px solid #fff;display:flex;align-items:center;justify-content:center;padding:0}
.ll-cam-shutter span{width:58px;height:58px;border-radius:999px;background:#fff;display:block;transition:transform .1s}
.ll-cam-shutter:active span{transform:scale(.9)}
.ll-cam-tip{color:rgba(255,255,255,.55);font-size:11.5px;text-align:center;max-width:280px}
.ll-cam-flash{position:absolute;inset:0;background:#fff;z-index:9;animation:flashfade .28s ease}

.ll-scan-cap{display:flex;flex-direction:column;gap:12px;margin-top:6px}
.ll-scan-photo{position:relative;height:158px;border-radius:var(--radius-sm);overflow:hidden;background:#15171c}
.ll-scan-photo-scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 90% at 50% 40%, #2a2f37, #101317)}
.ll-scan-photo-tag{position:absolute;left:10px;bottom:10px;display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;font-weight:600;padding:4px 8px;border-radius:7px;backdrop-filter:blur(6px)}
.ll-verified{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px}
.ll-verified.is-yes{border-left:4px solid var(--yes)}
.ll-verified.is-no{border-left:4px solid var(--warn)}
.ll-verified-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface-2)}
.ll-verified strong{display:block;font-size:14.5px;color:var(--ink)}
.ll-verified span{font-size:12.5px;color:var(--ink-2)}
.ll-signtext{white-space:pre-line;font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--ink);line-height:1.5;background:var(--surface-2);border-radius:10px;padding:13px}
.ll-signrule{display:flex;gap:8px;align-items:flex-start;margin-top:11px;font-size:13.5px;color:var(--ink-2);line-height:1.45}

/* ──────────────────────────────────────  snapshot  ──────────────────────── */
.ll-snapwrap{padding:6px 0 2px}
.ll-snap{position:relative;background:var(--surface);border:1px solid var(--line-2);border-radius:10px;padding:22px 20px;overflow:hidden;
  box-shadow:0 4px 12px rgba(20,22,40,.08),0 30px 60px -38px rgba(20,22,40,.5)}
.ll-snap-edge{position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--primary),color-mix(in srgb,var(--primary) 55%,var(--accent)))}
.ll-snap-head{display:flex;align-items:flex-start;justify-content:space-between;margin-top:6px}
.ll-snap-head-l{display:flex;align-items:center;gap:11px}
.ll-snap-brand{font-family:var(--font-legal);font-weight:800;font-size:19px;color:var(--ink);line-height:1}
.ll-snap-kind{text-transform:uppercase;font-size:10px;letter-spacing:1.4px;color:var(--ink-3);font-weight:700;margin-top:3px}
.ll-snap-meta{display:grid;grid-template-columns:1fr 1fr;gap:11px 14px;margin-top:18px}
.ll-snap-meta div{display:flex;flex-direction:column;gap:2px}
.ll-snap-meta span{text-transform:uppercase;font-size:9.5px;letter-spacing:.7px;color:var(--ink-3);font-weight:700}
.ll-snap-meta b{font-size:12.5px;color:var(--ink);font-weight:600}
.ll-snap-rule{height:1px;background:var(--line);margin:16px 0}
.ll-snap-lbl{text-transform:uppercase;font-size:10px;letter-spacing:1px;color:var(--ink-3);font-weight:700;margin-bottom:6px}
.ll-snap-q{font-family:var(--font-legal);font-style:italic;font-size:16px;color:var(--ink);line-height:1.35}
.ll-snap-verdict{display:inline-flex;align-items:center;gap:8px;border:1.5px solid;border-radius:9px;padding:9px 13px;margin:15px 0;
  font-weight:800;letter-spacing:1.4px;font-size:14px;text-transform:uppercase;width:100%}
.ll-snap-verdict-conf{font-family:var(--font-mono);font-size:11px;font-weight:500;opacity:.75;margin-left:auto;letter-spacing:.3px}
.ll-snap-answer{font-family:var(--font-legal);font-size:14.5px;line-height:1.6;color:var(--ink);margin:0}
.ll-snap-cite{display:flex;gap:8px;margin-top:7px;font-size:12.5px;color:var(--ink-2);line-height:1.4}
.ll-snap-cite .mono{color:var(--ink);font-weight:600;flex-shrink:0}
.ll-snap-cite-name{flex:1}
.ll-snap-foot{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.ll-snap-hash{flex:1}
.ll-snap-hash .mono{font-size:11px;color:var(--ink-2);word-break:break-all}
.ll-snap-fine{font-size:10px;color:var(--ink-3);margin-top:7px;line-height:1.45}
.ll-snap-qr{display:grid;grid-template-columns:repeat(7,1fr);gap:1.5px;width:54px;height:54px;flex-shrink:0;padding:4px;background:#fff;border:1px solid var(--line);border-radius:6px}
.ll-snap-qr span{background:var(--ink);border-radius:1px}
.ll-snap-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}

/* ──────────────────────────────────────  coverage  ──────────────────────── */
.ll-map{position:relative;height:200px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);margin-top:6px;
  --map-park:color-mix(in srgb,var(--accent) 22%,transparent);
  --map-water:color-mix(in srgb,#3478c8 22%,transparent);
  --map-road:var(--surface);--map-road2:var(--line-2);background:var(--surface-2)}
.ll-map-grid{position:absolute;inset:0;width:100%;height:100%}
.ll-map-grid path[stroke="var(--map-road)"]{stroke:var(--surface)}
.ll-map-boundary-lbl{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:4px;background:color-mix(in srgb,var(--surface) 90%,transparent);
  backdrop-filter:blur(6px);padding:5px 9px;border-radius:999px;font-size:11px;font-weight:700;color:var(--primary)}
.ll-map-pin{position:absolute;top:48%;left:46%;transform:translate(-50%,-50%)}
.ll-map-acc{position:absolute;top:50%;left:50%;width:84px;height:84px;border-radius:999px;transform:translate(-50%,-50%);
  background:color-mix(in srgb,var(--primary) 18%,transparent);border:1px solid color-mix(in srgb,var(--primary) 40%,transparent);animation:mapacc 2.6s ease-out infinite}
.ll-map-dot{position:absolute;top:50%;left:50%;width:18px;height:18px;border-radius:999px;transform:translate(-50%,-50%);
  background:var(--primary);border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.3)}
.ll-map-where{position:absolute;left:10px;bottom:10px;display:flex;align-items:center;gap:6px;background:var(--surface);
  border-radius:10px;padding:8px 11px;font-size:12.5px;color:var(--ink);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.ll-cov-summary{display:flex;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-top:12px}
.ll-cov-stat{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:2px}
.ll-cov-stat b{font-family:var(--font-legal);font-weight:800;font-size:23px;color:var(--ink)}
.ll-cov-stat span{font-size:11.5px;color:var(--ink-3)}
.ll-cov-divider{width:1px;height:34px;background:var(--line)}
.ll-cov-list{display:flex;flex-direction:column;gap:8px}
.ll-cov-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px}
.ll-cov-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-cov-main{flex:1;min-width:0}
.ll-cov-name{font-weight:600;font-size:14px;color:var(--ink)}
.ll-cov-sub{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:12px;color:var(--ink-3);flex-wrap:wrap}
.ll-status{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:4px 8px;border-radius:6px}
.ll-status-ok{color:var(--yes-ink);background:var(--yes-soft)}
.ll-status-partial{color:var(--warn-ink);background:var(--warn-soft)}
.ll-status-missing{color:var(--ink-3);background:var(--surface-3)}
.ll-cov-gap{display:flex;gap:8px;align-items:flex-start;background:var(--warn-soft);color:var(--warn-ink);border-radius:var(--radius-sm);padding:12px 14px;margin-top:12px;font-size:12.5px;line-height:1.5}
.ll-cov-gap svg{flex-shrink:0;margin-top:1px}

/* ──────────────────────────────────────  records  ───────────────────────── */
.ll-records-intro{font-size:13px;color:var(--ink-2);line-height:1.5;margin:6px 2px 14px}
.ll-rec-list{display:flex;flex-direction:column;gap:8px}
.ll-rec{display:flex;align-items:center;gap:12px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;text-align:left;transition:transform .08s}
.ll-rec:active{transform:scale(.99)}
.ll-rec-seal{width:38px;height:38px;border-radius:999px;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-rec-main{flex:1;min-width:0}
.ll-rec-label{font-weight:600;font-size:14px;color:var(--ink)}
.ll-rec-sub{display:flex;align-items:center;gap:4px;margin-top:3px;font-size:12px;color:var(--ink-3)}
.ll-rec-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.ll-rec-id{font-size:10px;color:var(--ink-3)}

/* ──────────────────────────────────────  settings  ──────────────────────── */
.ll-set-group{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:4px}
.ll-set-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line)}
.ll-set-row.is-last{border-bottom:none}
.ll-set-ic{width:30px;height:30px;border-radius:9px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-set-title{flex:1;font-size:15px;color:var(--ink)}
.ll-set-title.is-danger{color:var(--no)}
.ll-set-detail{font-size:14px;color:var(--ink-3)}
.ll-toggle{width:46px;height:28px;border-radius:999px;background:var(--line-2);position:relative;transition:background .2s;flex-shrink:0}
.ll-toggle.is-on{background:var(--accent)}
.ll-toggle-knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .2s}
.ll-toggle.is-on .ll-toggle-knob{transform:translateX(18px)}
.ll-set-themes{display:flex;gap:8px}
.ll-themecard{flex:1;display:flex;flex-direction:column;gap:9px;align-items:flex-start;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:12px 11px;position:relative;transition:border-color .15s}
.ll-themecard.is-on{border-color:var(--primary)}
.ll-themecard-swatch{display:flex;gap:3px}
.ll-themecard-swatch span{width:15px;height:15px;border-radius:999px}
.ll-themecard-name{font-size:11.5px;font-weight:600;line-height:1.2}
.ll-themecard-check{position:absolute;top:8px;right:8px}
.ll-set-about{display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;padding:22px 8px 8px;margin-top:8px}
.ll-set-ver{font-weight:700;font-size:13px;color:var(--ink)}
.ll-set-about p{font-size:11.5px;color:var(--ink-3);line-height:1.5;max-width:280px;margin:0}
.ll-set-links{font-size:12px;color:var(--primary);font-weight:600}

/* ────────────────────────────────────────  sheet  ───────────────────────── */
.ll-sheet-scrim{position:absolute;inset:0;background:rgba(10,12,24,.4);opacity:0;pointer-events:none;transition:opacity .28s;z-index:80}
.ll-sheet-scrim.is-open{opacity:1;pointer-events:auto}
.ll-sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:26px 26px 0 0;padding:12px 18px 34px;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.2,1);box-shadow:0 -16px 40px rgba(0,0,0,.2)}
.ll-sheet.is-open{transform:translateY(0)}
.ll-sheet-grip{width:40px;height:4px;border-radius:999px;background:var(--line-2);margin:0 auto 14px}
.ll-sheet-title{font-family:var(--font-legal);font-weight:700;font-size:19px;color:var(--ink);margin-bottom:13px}
.ll-sheet-cur{display:flex;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px}
.ll-sheet-cur-ic{width:40px;height:40px;border-radius:11px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-sheet-cur-main{flex:1;min-width:0}
.ll-sheet-cur-main strong{display:block;font-size:14.5px;color:var(--ink)}
.ll-sheet-cur-main span{font-size:11.5px;color:var(--ink-3)}
.ll-sheet-lbl{text-transform:uppercase;font-size:11px;letter-spacing:.6px;color:var(--ink-3);font-weight:700;margin:16px 0 8px}
.ll-sheet-other{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink-2)}
.ll-sheet-other span:nth-child(2){flex:1}

/* ────────────────────────────────────────  keyframes  ───────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 55%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
@keyframes radar{0%{transform:scale(.6);opacity:.9}100%{transform:scale(1.25);opacity:0}}
@keyframes rise{from{transform:translateY(16px)}to{transform:translateY(0)}}
@keyframes scan{0%,100%{top:26%}50%{top:64%}}
@keyframes flashfade{from{opacity:.9}to{opacity:0}}
@keyframes stampIn{0%{transform:scale(1.5)}60%{transform:scale(.96)}100%{transform:scale(1)}}
@keyframes mapacc{0%{transform:translate(-50%,-50%) scale(.7);opacity:.8}100%{transform:translate(-50%,-50%) scale(1.3);opacity:0}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}

/* photo → laws: per-law card */
.ll-photolaw{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:10px}
.ll-photolaw-head{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.ll-photolaw-ic{width:28px;height:28px;border-radius:8px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-photolaw-head strong{font-size:14px;color:var(--ink);line-height:1.3}
.ll-photolaw-exp{margin:0 0 8px;font-size:13px;line-height:1.5;color:var(--ink-2)}

template{display:none}

/* #3 verify / low-confidence nudge */
.ll-verify{display:flex;gap:10px;align-items:flex-start;margin:12px 0 0;padding:12px 14px;border-radius:14px;background:color-mix(in srgb,var(--warn) 9%,var(--surface-2));border:1px solid color-mix(in srgb,var(--warn) 30%,var(--line))}
.ll-verify-ic{flex:none;margin-top:1px}
.ll-verify-txt{display:flex;flex-direction:column;gap:3px}
.ll-verify-txt strong{font-size:13.5px;color:var(--ink)}
.ll-verify-txt span{font-size:12.5px;line-height:1.5;color:var(--ink-2)}

/* #2 transparency "why this verdict" panel */
.ll-why{margin:14px 0 0;border:1px solid var(--line);border-radius:14px;background:var(--surface-2);overflow:hidden}
.ll-why-toggle{width:100%;display:flex;align-items:center;gap:8px;padding:13px 14px;background:none;border:0;cursor:pointer;color:var(--ink);font:inherit;font-size:13.5px;font-weight:600}
.ll-why-count{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--ink-3);background:var(--surface-3);padding:2px 8px;border-radius:999px}
.ll-why-chev{transition:transform .2s ease}
.ll-why-chev.is-open{transform:rotate(180deg)}
.ll-why-body{padding:4px 14px 14px;border-top:1px solid var(--line)}
.ll-why-note{font-size:12px;line-height:1.5;color:var(--ink-3);margin:10px 0 12px}
.ll-why-row{padding:9px 0;border-top:1px dashed var(--line)}
.ll-why-row:first-of-type{border-top:0}
.ll-why-row-top{display:flex;align-items:center;gap:8px}
.ll-why-lvl{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,transparent);padding:2px 7px;border-radius:6px;flex:none}
.ll-why-sid{font-size:12.5px;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ll-why-sim{margin-left:auto;font-size:12px;font-weight:700;color:var(--ink-2);flex:none}
.ll-why-where{font-size:11px;color:var(--ink-3);margin:2px 0 0}
.ll-why-bar{height:5px;border-radius:999px;background:var(--surface-3);overflow:hidden;margin:6px 0 0}
.ll-why-bar-fill{height:100%;border-radius:999px;background:var(--primary)}
.ll-why-prev{font-size:11.5px;line-height:1.5;color:var(--ink-2);margin:7px 0 0;max-height:3.2em;overflow:hidden}

/* "Ask a Lawyer" escalation — low-confidence safety hand-off */
.ll-escalate{margin:12px 0 0;border:1px solid color-mix(in srgb,var(--primary) 30%,var(--line));border-radius:14px;background:color-mix(in srgb,var(--primary) 6%,var(--surface-2));overflow:hidden}
.ll-escalate-head{display:flex;gap:10px;align-items:flex-start;padding:13px 14px 10px}
.ll-escalate-ic{flex:none;margin-top:1px}
.ll-escalate-head strong{display:block;font-size:13.5px;color:var(--ink)}
.ll-escalate-sub{display:block;font-size:12.5px;line-height:1.5;color:var(--ink-2);margin-top:3px}
.ll-escalate-list{padding:0 8px 4px}
.ll-escalate-row{display:grid;grid-template-columns:1fr auto;align-items:center;column-gap:8px;padding:10px;border-radius:10px;text-decoration:none;color:inherit;border-top:1px dashed var(--line)}
.ll-escalate-row:first-child{border-top:0}
.ll-escalate-row:hover{background:color-mix(in srgb,var(--primary) 8%,transparent)}
.ll-escalate-kind{grid-column:1;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--primary)}
.ll-escalate-name{grid-column:1;font-size:13px;font-weight:600;color:var(--ink);margin-top:2px}
.ll-escalate-detail{grid-column:1;font-size:11.5px;line-height:1.4;color:var(--ink-3);margin-top:2px}
.ll-escalate-chev{grid-column:2;grid-row:1 / span 3;transform:rotate(-90deg);color:var(--ink-3);flex:none}
.ll-escalate-foot{font-size:11px;line-height:1.5;color:var(--ink-3);margin:0;padding:4px 14px 13px}
</style>
</head>
