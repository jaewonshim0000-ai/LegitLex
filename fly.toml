# Fly.io config for LegitLex. Run `fly launch --no-deploy` once to claim an app
# name + region (it will update this file), then `fly deploy`.
app = "lexlocator"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "300s"
    method = "GET"
    path = "/api/health"

# Full 93k-chunk vector store + the multilingual embedding model. The HNSW index
# (93k vectors) lives in RAM alongside two model weights + torch, so 2 GB swaps
# and thrashes — 4 GB + 2 CPUs keeps it responsive.
[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"
  cpus = 2
